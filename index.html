<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIELSENSI - Sensi Capudo R$ 4,99</title>

<!-- Preview WhatsApp -->
<meta property="og:title" content="BIELSENSI - Sensi Capudo R$ 4,99">
<meta property="og:description" content="Sensi atualizada pra Android, iOS e Emulador. Cola capa fácil! 🔥">
<meta property="og:image" content="https://i.imgur.com/8QzXqXk.png">
<meta property="og:url" content="https://seusite.github.io/BIELSENSI/">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:Arial,sans-serif;background-image:radial-gradient(circle at 20% 50%,#330000 0%,transparent 50%),radial-gradient(circle at 80% 80%,#1a0000 0%,transparent 50%);min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:20px}
header{text-align:center;padding:30px 0}
.logo{font-size:38px;font-weight:900;background:linear-gradient(90deg,#ff0000,#ff6600);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.sub{color:#888;font-size:14px;margin-bottom:25px}
.card{background:linear-gradient(145deg,#1a1a2e,#0f0f1e);border:2px solid #ff0000;border-radius:20px;padding:30px;text-align:center;box-shadow:0 0 30px rgba(255,0,0,.2)}
.card h2{font-size:28px;margin-bottom:15px;color:#ff6600}
.preco{margin:20px 0}
.preco.valor{font-size:48px;font-weight:900;color:#00ff88}
.preco.centavos{font-size:28px;color:#00ff88}
.plataformas{display:flex;gap:10px;margin:25px 0}
.plat-btn{flex:1;padding:12px;border:2px solid #2a2a4a;background:#0f0f1e;color:#888;border-radius:10px;cursor:pointer;font-weight:bold;transition:.3s}
.plat-btn.ativo{border-color:#ff0000;color:#ff0000;background:#ff000010}
.sensi-box{background:#0f0f1e;border:2px solid #2a2a4a;border-radius:15px;padding:20px;margin:20px 0;text-align:left}
.sensi-box h3{color:#ff6600;margin-bottom:15px;text-align:center}
.sensi-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #2a2a4a;font-size:15px}
.sensi-item:last-child{border-bottom:none}
.sensi-item span:first-child{color:#aaa}
.sensi-item span:last-child{color:#00ff88;font-weight:bold}
.form-section{margin-top:25px}
.input-group{margin-bottom:15px;text-align:left}
.input-group label{display:block;margin-bottom:5px;font-size:14px;color:#aaa}
.input-group input{width:100%;padding:12px;background:#0f0f1e;border:2px solid #2a2a4a;border-radius:10px;color:#fff;font-size:16px}
.input-group input:focus{outline:none;border-color:#ff0000}
.btn-comprar{width:100%;padding:16px;border:none;background:linear-gradient(90deg,#ff0000,#ff6600);color:#fff;font-size:18px;font-weight:900;border-radius:12px;cursor:pointer;text-transform:uppercase;margin-top:10px;transition:.3s}
.btn-comprar:hover{transform:scale(1.03);box-shadow:0 0 25px rgba(255,0,0,.5)}
.beneficios{list-style:none;margin:25px 0;text-align:left}
.beneficios li{padding:8px 0;font-size:14px;display:flex;align-items:center;gap:10px;color:#ddd}
.beneficios li::before{content:'✓';color:#00ff88;font-weight:bold;font-size:18px;background:#00ff8820;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
footer{text-align:center;padding:30px 0;color:#555;font-size:12px}
</style>
</head>
<body>
<div class="container">
<header>
<div class="logo">BIELSENSI</div>
<div class="sub">Atualizada Set/2026 - Android | iOS | Emulador</div>
</header>

<div class="card">
<h2>PACK SENSI CAPUDO</h2>

<div class="preco">R$ <span class="valor">4</span><span class="centavos">,99</span></div>

<ul class="beneficios">
<li>Sensi pra Android, iOS e Emulador</li>
<li>Configuração testada por BIELSENSI</li>
<li>Entrega automática após pagamento</li>
<li>Suporte via WhatsApp</li>
<li>Atualização grátis por 30 dias</li>
</ul>

<div class="plataformas">
<button class="plat-btn ativo" onclick="trocarPlat('android')">ANDROID</button>
<button class="plat-btn" onclick="trocarPlat('ios')">IOS</button>
<button class="plat-btn" onclick="trocarPlat('emu')">EMULADOR</button>
</div>

<div class="sensi-box" id="sensiDisplay"></div>

<div class="form-section">
<div class="input-group"><label>Seu Nome</label><input type="text" id="nome" placeholder="Nome pra receber a sensi" required></div>
<div class="input-group"><label>Seu Email</label><input type="email" id="email" placeholder="Email pra entrega automática" required></div>
<button class="btn-comprar" onclick="comprarSensi()">COMPRAR AGORA</button>
</div>

</div>
<footer>© 2026 BIELSENSI - Entrega Automática</footer>
</div>

<script>
// ===== CONFIGURAÇÕES QUE VOCÊ MUDA =====
const LINK_CAKTO = "https://pay.cakto.com.br/SEU_LINK_AQUI"; // COLOCA SEU LINK DA CAKTO AQUI
const WHATSAPP = "5577981047147"; // Seu número pra suporte
// =======================================

// SENSIS BIELSENSI - ATUALIZADAS SET/2026
const SENSIS = {
android: {
titulo: "BIELSENSI ANDROID",
geral: 100,
red: 98,
x2: 95,
x4: 93,
awm: 88,
botao: 52,
dpi: "650-700",
tamanho: 59
},
ios: {
titulo: "BIELSENSI IPHONE",
geral: 100,
red: 100,
x2: 97,
x4: 95,
awm: 90,
botao: 48,
dpi: "Nativo",
tamanho: 55
},
emu: {
titulo: "BIELSENSI EMULADOR",
geral: 100,
red: 100,
x2: 98,
x4: 96,
awm: 92,
botao: 50,
dpi: "1600",
tamanho: 65
}
};

let platAtual = 'android';

function trocarPlat(plat) {
platAtual = plat;
document.querySelectorAll('.plat-btn').forEach(btn => btn.classList.remove('ativo'));
event.target.classList.add('ativo');
mostrarSensi();
}

function mostrarSensi() {
const s = SENSIS[platAtual];
document.getElementById('sensiDisplay').innerHTML = `
<h3>${s.titulo}</h3>
<div class="sensi-item"><span>Geral</span><span>${s.geral}</span></div>
<div class="sensi-item"><span>Ponto Vermelho</span><span>${s.red}</span></div>
<div class="sensi-item"><span>Mira 2X</span><span>${s.x2}</span></div>
<div class="sensi-item"><span>Mira 4X</span><span>${s.x4}</span></div>
<div class="sensi-item"><span>Mira AWM</span><span>${s.awm}</span></div>
<div class="sensi-item"><span>Botão de Tiro</span><span>${s.botao}</span></div>
<div class="sensi-item"><span>DPI Recomendado</span><span>${s.dpi}</span></div>
<div class="sensi-item"><span>Tamanho do Botão</span><span>${s.tamanho}</span></div>
`;
}
mostrarSensi();

function comprarSensi() {
const nome = document.getElementById('nome').value.trim();
const email = document.getElementById('email').value.trim();

if (nome.length < 3) return alert('Digite seu nome completo');
if (!email.includes('@')) return alert('Digite um email válido');

window.open(`${LINK_CAKTO}?name=${encodeURIComponent(nome)}&email=${encodeURIComponent(email)}&plat=${platAtual}`, '_blank');
}
</script>
</body>
</html>
